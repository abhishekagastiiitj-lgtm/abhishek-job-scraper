# ─────────────────────────────────────────────────────────────────────────────
#  Abhishek Job Tracker — GitHub Actions Workflow  v6
#  Schedule : every day at 08:00 IST  (02:30 UTC)
#  Sources  : 16 platforms (Remote Aggregators · ATS Boards · India Portals)
#  NEW v6   : ANTHROPIC_API_KEY → per-job ATS-optimised resume PDFs in col N
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Job Scraper v6

on:
  schedule:
    - cron: "30 2 * * *"   # 02:30 UTC = 08:00 IST every day
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # Extended — resume generation adds ~1s per new job

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install --quiet requests openpyxl reportlab

      # ── 4. Restore seen_jobs.json cache ───────────────────────────────────
      - name: Restore seen jobs cache
        id: cache-seen
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-v6
          restore-keys: |
            seen-jobs-v6
            seen-jobs-v5
            seen-jobs-v4
            seen-jobs-

      # ── 5. Restore jobs_tracker.xlsx cache ────────────────────────────────
      - name: Restore Excel tracker cache
        id: cache-excel
        uses: actions/cache/restore@v4
        with:
          path: jobs_tracker.xlsx
          key: excel-tracker-v6
          restore-keys: |
            excel-tracker-v6
            excel-tracker-v5
            excel-tracker-

      # ── 6. Run scraper ────────────────────────────────────────────────────
      - name: Run job scraper
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:    ${{ secrets.EMAIL_RECIPIENT }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      # ── 7. Save updated seen_jobs.json ────────────────────────────────────
      - name: Delete old seen jobs cache
        if: always()
        run: |
          gh extension install actions/gh-actions-cache || true
          gh actions-cache delete seen-jobs-v6 --confirm || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save updated seen jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-v6

      # ── 8. Save updated Excel tracker ─────────────────────────────────────
      - name: Delete old Excel tracker cache
        if: always()
        run: gh actions-cache delete excel-tracker-v6 --confirm || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save updated Excel tracker cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: jobs_tracker.xlsx
          key: excel-tracker-v6

      # ── 9. Upload all outputs as artifact ─────────────────────────────────
      # Downloads contain: jobs_tracker.xlsx + resumes/ folder + seen_jobs.json
      - name: Upload job tracker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-tracker-${{ github.run_number }}
          path: |
            jobs_tracker.xlsx
            seen_jobs.json
            digest_output.html
            resumes/
          retention-days: 60
          if-no-files-found: ignore
